# Тренировочный вариант ОГЭ по информатике (первая часть, задания 1–10).
# Задания оригинальные, составлены для демонстрации формата бота.
subject: informatics
subject_title: Информатика
slug: "2026-09"
month: Сентябрь 2026
title: Информатика ОГЭ — сентябрь 2026
description: Тренировочный вариант первой (тестовой) части. 10 заданий с кратким ответом.
published: true
tasks:
  - number: 1
    statement: >-
      В кодировке КОИ-8 каждый символ кодируется восемью битами. Ученик написал
      сообщение из 60 символов. Определите информационный объём сообщения в байтах.
    answer_type: number
    answer: 60
    explanation: 8 бит = 1 байт, поэтому 60 символов занимают 60 байт.

  - number: 2
    statement: >-
      Сколько существует целых значений x, при которых истинно высказывание
      (x > 10) И (x < 20)?
    answer_type: number
    answer: 9
    explanation: Подходят числа 11, 12, …, 19 — всего 9 значений.

  - number: 3
    statement: >-
      Для кодирования сообщений из букв А, Б и В используется неравномерный
      двоичный код: А — 0, Б — 10, В — 11. Сколько букв содержит сообщение 0101011?
    answer_type: number
    answer: 4
    explanation: >-
      Декодируем слева направо: 0=А, 10=Б, 10=Б, 11=В — получаем АББВ, то есть 4 буквы.

  - number: 4
    statement: >-
      У исполнителя две команды: 1) прибавь 1; 2) умножь на 2. К числу 3 применили
      программу 1 1 2 2 (прибавь 1, прибавь 1, умножь на 2, умножь на 2). Какое
      число получится?
    answer_type: number
    answer: 20
    explanation: 3 → 4 → 5 → 10 → 20.

  - number: 5
    statement: >-
      Между населёнными пунктами построены дороги с односторонним движением:
      А→Б, А→В, Б→Г, В→Г, Г→Д, В→Д. Сколько существует различных путей из А в Д?
    answer_type: number
    answer: 3
    image_url: "https://placehold.co/640x360/png?text=Shema+dorog+A-D"
    explanation: >-
      Пути: А→Б→Г→Д, А→В→Г→Д, А→В→Д. Всего три пути.

  - number: 6
    statement: >-
      В электронной таблице значение ячейки A1 равно 5. В ячейку B1 записана
      формула =A1*2, а в ячейку C1 — формула =A1+B1. Какое число появится в C1?
    answer_type: number
    answer: 15
    explanation: B1 = 5·2 = 10, C1 = 5 + 10 = 15.

  - number: 7
    statement: >-
      По запросу «кошки | собаки» найдено 900 страниц, по запросу «кошки» — 500,
      по запросу «собаки» — 600. Сколько страниц найдёт запрос «кошки & собаки»?
    answer_type: number
    answer: 200
    explanation: >-
      |A ∪ B| = |A| + |B| − |A ∩ B| ⇒ 900 = 500 + 600 − x ⇒ x = 200.

  - number: 8
    statement: >-
      Переведите число 27 из десятичной системы счисления в двоичную.
      В ответ запишите полученное двоичное число.
    answer_type: sequence
    answer: "11011"
    explanation: 27 = 16 + 8 + 2 + 1 = 11011₂.

  - number: 9
    statement: >-
      Определите значение переменной s после выполнения фрагмента программы:
      s = 0; for i in range(1, 5): s = s + i
    answer_type: number
    answer: 10
    explanation: range(1, 5) даёт 1, 2, 3, 4; их сумма равна 10.

  - number: 10
    statement: >-
      Файл размером 2 Кбайт передаётся за 16 секунд. Определите скорость передачи
      данных в битах в секунду. (1 Кбайт = 1024 байта.)
    answer_type: number
    answer: 1024
    explanation: 2 · 1024 · 8 = 16384 бита; 16384 / 16 = 1024 бит/с.
